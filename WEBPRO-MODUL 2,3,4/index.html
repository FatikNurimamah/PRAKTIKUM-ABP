<!DOCTYPE html>
<html>
<head>
<title>IdolVerse</title>
<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background-color:#111;
    color:white;
}

header{
    background:linear-gradient(90deg,#ff4fa3,#7b5cff);
    padding:20px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

nav{
    text-align:center;
    background:#000;
    padding:12px;
}

nav a{
    color:white;
    margin:15px;
    text-decoration:none;
    font-size:18px;
}

nav a:hover{
    color:#ff4fa3;
}

.hero{
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:50px;
}

.hero p{
    font-size:20px;
}

.hero button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    background:#ff4fa3;
    color:white;
    border-radius:20px;
}

.section{
    padding:50px;
    text-align:center;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:150px;
    text-align:center;
}

.card img{
    width:150px;
    height:150px;
    object-fit:cover;
    border-radius:20px;
}

.card img:hover{
    transform:scale(1.05);
    transition:0.3s;
}

.card h3{
    margin-top:8px;
    font-size:14px;
}

footer{
    text-align:center;
    padding:20px;
    background:#000;
}

</style>
</head>

<body>

<header>
IdolVerse
</header>

<nav>
<a href="#">Home</a>
<a href="#">Groups</a>
<a href="#">Songs</a>
<a href="#">Gallery</a>
</nav>

<div class="hero">
<h1>Welcome To IdolVerse</h1>
<p>Discover your favorite idols, songs, and performances</p>
<button>Explore Now</button>
</div>

<div class="section">
<h2>K-Pop Artists</h2>

<div class="cards">

<div class="card">
<img src="BLACKPINK.webp">
<h3>BLACKPINK</h3>
</div>

<div class="card">
<img src="SEVENTEEN.webp">
<h3>SEVENTEEN</h3>
</div>

<div class="card">
<img src="ATEEZ.jpg">
<h3>ATEEZ</h3>
</div>

<div class="card">
<img src="CORTIS.webp">
<h3>CORTIS</h3>
</div>

<div class="card">
<img src="LONGSHOT.jpg">
<h3>LONGSHOT</h3>
</div>

<div class="card">
<img src="STRAYKIDS.jpg">
<h3>Stray Kids</h3>
</div>

<div class="card">
<img src="TWICE.jpg">
<h3>TWICE</h3>
</div>

<div class="card">
<img src="HEARTS2HEARTS.jpg">
<h3>Hearts2Hearts</h3>
</div>

<div class="card">
<img src="NCT127.jpg">
<h3>NCT 127</h3>
</div>

<div class="card">
<img src="TXT.jpg">
<h3>TXT</h3>
</div>

<div class="card">
<img src="ENHYPEN.jpg">
<h3>ENHYPEN</h3>
</div>

</div>
</div>

<footer>
© 2026 IdolVerse
</footer>

</body>
</html>
