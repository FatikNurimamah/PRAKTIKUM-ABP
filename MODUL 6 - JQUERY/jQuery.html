<!DOCTYPE html>
<html>

<head>
    <title>The jQuery Example</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
        $(document).ready(function () {

            // Alert test
            alert("jQuery berhasil jalan!");

            // Hide Show
            $("#hide").click(function () {
                $("#text").hide();
            });

            $("#show").click(function () {
                $("#text").show();
            });

            $("#animate").click(function () {
                $("#box").animate({
                    height: 'toggle'
                });
            });

        });
    </script>
</head>

<body>

    <h1>Hello</h1>

    <!-- Hide Show -->
    <p id="text">If you click on the "Hide" button, I will disappear.</p>
    <button id="hide">Hide</button>
    <button id="show">Show</button>

    <br><br>

    <!-- Animasi -->
    <p>Click the button multiple times to toggle the animation.</p>
    <button id="animate">Start Animation</button>

    <div id="box" style="background:#98bf21; height:100px; width:100px; position:absolute;"></div>

</body>

</html>
